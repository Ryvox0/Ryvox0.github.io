<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>

    <style>
        :root {
          --bg: #0d1117;
          --card: #161b22;
          --text: #e6edf3;
          --muted: #9da7b3;
          --accent: #58a6ff;
          --border: #30363d;
          --warn: #f0b429;
        }

        body {
          margin: 0;
          font-family: Arial, Helvetica, sans-serif;
          background: var(--bg);
          color: var(--text);
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          padding: 20px;
        }

        .box {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 16px;
          padding: 50px;
          max-width: 650px;
          width: 100%;
          text-align: center;
        }

        .badge {
          display: inline-block;
          background: var(--warn);
          color: #000;
          font-weight: bold;
          padding: 6px 12px;
          border-radius: 6px;
          font-size: 12px;
          margin-bottom: 15px;
        }

        h1 {
          margin: 0;
          font-size: 38px;
        }

        p {
          color: var(--muted);
          margin-top: 15px;
          line-height: 1.6;
        }

        .loader {
          margin: 30px auto;
          width: 40px;
          height: 40px;
          border: 4px solid var(--border);
          border-top: 4px solid var(--accent);
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }

        @keyframes spin {
          100% { transform: rotate(360deg); }
        }

        .btn {
          display: inline-block;
          margin-top: 20px;
          padding: 10px 15px;
          background: var(--accent);
          color: #000;
          text-decoration: none;
          border-radius: 8px;
          font-weight: bold;
        }

        .btn:hover {
          opacity: 0.85;
        }

    </style>
</head>

<body>

<div class="box">

    <div class="badge">WORK IN PROGRESS</div>

    <h1>🚧 Coming Soon</h1>

    <p>
        This section is currently under development.<br>
        We are working on bringing this feature to you as soon as possible.
    </p>

    <div class="loader"></div>

    <p>
        Please check back later or return to the main page.
    </p>

    <a class="btn" href="../../index.html">Go Back Home</a>

</div>

</body>
</html>
